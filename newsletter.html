<!-- ══════════════ SCRIPTS ══════════════ -->
<script src="assets/js/newsletter-data.js"></script>
<script>
/* ── 렌더링 ── */
function renderCards() {
  var data = window.NEWSLETTER_DATA || [];
  var grid = document.getElementById('nlGrid');

  document.getElementById('nlStatCount').textContent = data.length;

  if (!data.length) {
    grid.innerHTML = '<div class="nl-empty"><p>아직 발행된 뉴스레터가 없습니다.</p></div>';
    return;
  }

  grid.innerHTML = data.map(function(nl) {
    return [
      '<article class="nl-card" onclick="openNlModal(\'' + nl.id + '\')">',
      '  <div class="nl-card-accent" style="background:' + nl.color + '">',
      '    <span class="nl-issue-badge">통권 ' + nl.issue + '호</span>',
      '    <div class="nl-card-date">' + nl.label + '</div>',
      '  </div>',
      '  <div class="nl-card-body">',
      '    <h3 class="nl-card-title">' + nl.title + '</h3>',
      '    <p class="nl-card-summary">' + nl.summary + '</p>',
      '    <div class="nl-card-foot">',
      '      <span class="nl-read-link">읽기 →</span>',
      '    </div>',
      '  </div>',
      '</article>'
    ].join('\n');
  }).join('');
}

/* ── 모달 ── */
function openNlModal(id) {
  var data = window.NEWSLETTER_DATA || [];
  var nl   = data.find(function(n){ return n.id === id; });
  if (!nl) return;

  document.getElementById('nlModalContent').innerHTML = [
    '<div class="nl-modal-header" style="background:' + nl.color + '">',
    '  <div class="nl-modal-meta-row">',
    '    <span class="nl-issue-badge">통권 ' + nl.issue + '호</span>',
    '    <p class="nl-modal-date">' + nl.label + '</p>',
    '  </div>',
    '  <h2 class="nl-modal-title">' + nl.title + '</h2>',
    '</div>',
    '<div class="nl-modal-body">' + nl.content + '</div>'
  ].join('\n');

  document.getElementById('nlModal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeNlModal() {
  document.getElementById('nlModal').classList.remove('open');
  document.body.style.overflow = '';
}

/* ── 초기화 ── */
document.addEventListener('DOMContentLoaded', function () {
  renderCards();
  document.getElementById('hamburger').addEventListener('click', function () {
    document.getElementById('mainNav').classList.toggle('open');
  });
});

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeNlModal();
});
</script>
  <script src="assets/js/i18n-map.js"></script>
  <script src="assets/js/i18n.js"></script>
</body>
</html>
