<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="robots" content="noindex" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>페이지를 찾을 수 없습니다 — 티움</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800&family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/style.css?v=49" />
  <link rel="icon" type="image/png" href="assets/images/tieum-icon-192.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="assets/images/tieum-icon-32.png" />
  <link rel="apple-touch-icon" href="assets/images/apple-touch-icon.png" />
  <style>
    .nf-wrap{
      min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
      text-align:center;padding:40px 24px;font-family:'Noto Sans KR',sans-serif;
      background:linear-gradient(160deg,#1B4F8A 0%,#10325c 100%);color:#fff;
    }
    .nf-logo{font-family:'Montserrat',sans-serif;font-weight:800;font-size:1.6rem;letter-spacing:1px;margin-bottom:48px;color:#fff;text-decoration:none;}
    .nf-logo span{color:#F5A623;}
    .nf-code{font-family:'Montserrat',sans-serif;font-weight:800;font-size:7rem;line-height:1;color:#F5A623;margin:0;}
    .nf-title{font-size:1.5rem;font-weight:700;margin:16px 0 8px;}
    .nf-desc{font-size:1rem;opacity:.8;line-height:1.7;margin-bottom:36px;max-width:440px;}
    .nf-btns{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;}
    .nf-btn{
      display:inline-block;padding:13px 30px;border-radius:8px;font-weight:600;font-size:.97rem;
      text-decoration:none;transition:all .2s;
    }
    .nf-btn-primary{background:#F5A623;color:#1B4F8A;}
    .nf-btn-primary:hover{background:#ffb733;transform:translateY(-2px);}
    .nf-btn-ghost{background:transparent;color:#fff;border:1.5px solid rgba(255,255,255,.4);}
    .nf-btn-ghost:hover{border-color:#fff;background:rgba(255,255,255,.08);}
    @media(max-width:480px){.nf-code{font-size:5rem;}.nf-title{font-size:1.25rem;}}
  </style>
</head>
<body>
  <div class="nf-wrap">
    <a href="/" class="nf-logo">T<span>IEUM</span> 티움</a>
    <p class="nf-code">404</p>
    <h1 class="nf-title">페이지를 찾을 수 없습니다</h1>
    <p class="nf-desc">
      요청하신 페이지가 이동되었거나 존재하지 않습니다.<br>
      주소를 다시 확인하시거나, 아래 버튼으로 이동해 주세요.
    </p>
    <div class="nf-btns">
      <a href="/" class="nf-btn nf-btn-primary">홈으로 가기</a>
      <a href="/index.html#contact" class="nf-btn nf-btn-ghost">문의하기</a>
    </div>
  </div>
</body>
</html>
