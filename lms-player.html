<style>
/* ═══════ AI SUBTITLE SYSTEM ═══════ */
.subtitle-overlay {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  padding: 0 16px 14px;
  pointer-events: none;
  z-index: 20;
}
.subtitle-listening-badge {
  display: flex;
  align-items: center;
  gap: 7px;
  margin-bottom: 6px;
  justify-content: center;
}
.subtitle-pulse {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: #f87171;
  display: inline-block;
  animation: subtitle-pulse 1.2s ease-in-out infinite;
}
@keyframes subtitle-pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.4; transform: scale(0.75); }
}
#subtitleListeningLabel {
  font-size: .72rem;
  font-weight: 600;
  color: rgba(255,255,255,.85);
  letter-spacing: .06em;
  text-transform: uppercase;
  background: rgba(0,0,0,.55);
  padding: 2px 10px;
  border-radius: 50px;
  backdrop-filter: blur(6px);
}
.subtitle-text {
  background: rgba(0,0,0,.76);
  color: #fff;
  font-size: 1.05rem;
  font-weight: 500;
  line-height: 1.55;
  text-align: center;
  padding: 8px 20px 9px;
  border-radius: 10px;
  backdrop-filter: blur(8px);
  min-height: 2em;
  transition: opacity .35s ease;
  word-break: break-word;
  pointer-events: auto;
  border: 1px solid rgba(255,255,255,.12);
  box-shadow: 0 4px 18px rgba(0,0,0,.35);
}
.subtitle-text.interim {
  opacity: .55;
  font-style: italic;
}
.subtitle-text:empty { display: none; }

/* CC toggle button */
.subtitle-cc-btn {
  background: rgba(255,255,255,.12);
  color: #fff;
  border: 1.5px solid rgba(255,255,255,.3);
  border-radius: 6px;
  font-size: .8rem;
  font-weight: 700;
  padding: 6px 12px;
  cursor: pointer;
  transition: background .2s, border-color .2s, color .2s;
  letter-spacing: .04em;
  flex-shrink: 0;
}
.subtitle-cc-btn:hover { background: rgba(255,255,255,.22); border-color: rgba(255,255,255,.6); }
.subtitle-cc-btn.cc-active {
  background: #f87171;
  border-color: #f87171;
  color: #fff;
  animation: cc-glow .8s ease-in-out infinite alternate;
}
@keyframes cc-glow { from { box-shadow: 0 0 4px #f87171; } to { box-shadow: 0 0 12px #f87171aa; } }

/* AI 자막 안내 모달 */
.subtitle-guide-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.6);
  z-index: 2000;
  display: flex; align-items: center; justify-content: center;
}
.subtitle-guide-box {
  background: #1e2a3a;
  border-radius: 16px;
  padding: 32px 36px;
  max-width: 480px;
  width: 90%;
  color: #fff;
  box-shadow: 0 20px 60px rgba(0,0,0,.5);
  border: 1px solid rgba(255,255,255,.1);
}
.subtitle-guide-box h3 { font-size: 1.2rem; font-weight: 700; margin-bottom: 14px; display: flex; align-items: center; gap: 10px; }
.subtitle-guide-box p { font-size: .9rem; color: rgba(255,255,255,.75); line-height: 1.65; margin-bottom: 14px; }
.subtitle-guide-steps { list-style: none; padding: 0; margin: 0 0 22px; }
.subtitle-guide-steps li { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 10px; font-size: .88rem; color: rgba(255,255,255,.8); }
.subtitle-guide-step-num { background: #3b82f6; color: #fff; width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: .75rem; font-weight: 700; flex-shrink: 0; margin-top: 1px; }
.subtitle-guide-input-row { display: flex; gap: 8px; margin-bottom: 14px; }
.subtitle-guide-input-row input { flex: 1; background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.15); border-radius: 8px; color: #fff; padding: 8px 12px; font-size: .88rem; font-family: inherit; }
.subtitle-guide-input-row input::placeholder { color: rgba(255,255,255,.35); }
.subtitle-guide-actions { display: flex; gap: 10px; justify-content: flex-end; }
.subtitle-guide-actions button { padding: 9px 22px; border-radius: 8px; font-weight: 600; font-size: .88rem; cursor: pointer; border: none; }
.subtitle-btn-cancel { background: rgba(255,255,255,.08); color: rgba(255,255,255,.7); }
.subtitle-btn-cancel:hover { background: rgba(255,255,255,.14); }
.subtitle-btn-start { background: #3b82f6; color: #fff; }
.subtitle-btn-start:hover { background: #2563eb; }
.subtitle-api-hint { font-size: .78rem; color: rgba(255,255,255,.45); margin-top: 6px; }

/* Video wrap needs position:relative for overlay */
.player-video-wrap { position: relative; }
</style>

    </div>
  </div>
</header>

<!-- ══════════════════════ PLAYER LAYOUT ══════════════════════ -->
<div class="player-layout">

  <!-- ── 왼쪽: 사이드바 ── -->
  <aside class="player-sidebar" id="playerSidebar">
    <div class="sidebar-progress-wrap">
      <div class="sidebar-prog-label" data-i18n="pl.prog.label">전체 진도</div>
      <div class="sidebar-prog-bar">
        <div class="sidebar-prog-fill" id="sidebarProgFill"></div>
      </div>

    </div>

  <!-- ── 사이드바 토글 (모바일) ── -->

  <main class="player-main" id="playerMain">

    <!-- 영상 뷰 -->

        <!-- iframe 또는 준비중 화면이 여기에 렌더링 -->

        <div class="subtitle-listening-badge" id="subtitleListening">

      <div class="player-lesson-meta">
        <span class="player-module-label" id="infoModuleLabel"></span>
        <h2 class="player-lesson-title" id="infoLessonTitle"></h2>
        <span class="player-lesson-duration" id="infoLessonDuration"></span>
      </div>
      <div class="player-controls">
        <button class="player-ctrl-btn" id="ctrlPrev" onclick="goLesson('prev')" data-i18n="pl.prev">‹ 이전 강의</button>
        <button class="player-complete-btn" id="ctrlComplete" onclick="markAndNext()">
          <span id="ctrlCompleteLabel" data-i18n-html="pl.complete">완료 &amp; 다음 강의</span>
        </button>
        <button class="player-ctrl-btn" id="ctrlNext" onclick="goLesson('next')" data-i18n="pl.next">다음 강의 ›</button>
        <!-- AI 자막 토글 버튼 (영어 모드에서만 표시) -->

          🌐 CC

    <!-- 퀴즈 영역 -->

    <!-- ✍️ 성찰 일지 -->

        </span>

      </button>

      <div class="journal-panel" id="journalPanel" style="display:none;">

        <!-- 메지로 이론 설명 + 주차별 프롬프트 -->

          <div class="journal-write-footer">

<script src="assets/js/lms-data.js?v=14"></script>
<script src="assets/js/lms-core.js"></script>
<script>
/* ════════════════════ 상태 ════════════════════ */
var STATE = {
  courseId: '',
  lessonId: '',
  course: null,
  lesson: null,
  quizAnswers: {},
  quizSubmitted: false
};

/* ── 언어 헬퍼 ── */
function lp(ko, en) {
  return (typeof getLang === 'function' && getLang() === 'en') ? en : ko;
}

/* ════════════════════ 초기화 ════════════════════ */
document.addEventListener('DOMContentLoaded', function () {
  // 로그인 체크
  if (!lmsIsLoggedIn()) {
    location.href = 'lms.html';
    return;
  }

  // URL 파라미터 파싱
  var params   = new URLSearchParams(location.search);
  STATE.courseId = params.get('course') || '';
  STATE.lessonId = params.get('lesson') || '';
  STATE.course  = lmsGetCourse(STATE.courseId);

  if (!STATE.course) {
    location.href = 'lms.html';
    return;
  }

  // 첫 강의 기본값
  if (!STATE.lessonId) {
    var first = lmsGetFlatLessons(STATE.courseId)[0];
    if (first) STATE.lessonId = first.id;
  }

  // 사용자 이름
  var user = lmsGetUser();
  if (user) document.getElementById('playerUserName').textContent = user.name;

  // 코스 제목
  document.getElementById('playerCourseTitle').textContent = lp(STATE.course.title, STATE.course.title_en || STATE.course.title);
  document.title = lp(STATE.course.title, STATE.course.title_en || STATE.course.title) + ' — ' + lp('티움 러닝센터', 'TIEUM Learning Center');

  // 사이드바 + 현재 강의 렌더링
  renderSidebar();
  loadLesson(STATE.lessonId);
  updateJournalCount();
  initAiBot();
});

/* ════════════════════ 강의 로드 ════════════════════ */
function loadLesson(lessonId) {
  var meta = lmsGetLessonMeta(STATE.courseId, lessonId);
  if (!meta) return;

  STATE.lessonId      = lessonId;
  STATE.lesson        = meta.lesson;
  STATE.quizAnswers   = {};
  STATE.quizSubmitted = false;

  // URL 업데이트 (뒤로가기 지원)
  var newUrl = 'lms-player.html?course=' + STATE.courseId + '&lesson=' + lessonId;
  history.replaceState(null, '', newUrl);

  // 강의 메타 정보
  document.getElementById('infoModuleLabel').textContent = lp(meta.module.title, meta.module.title_en || meta.module.title);
  document.getElementById('infoLessonTitle').textContent = lp(meta.lesson.title, meta.lesson.title_en || meta.lesson.title);
  document.getElementById('infoLessonDuration').textContent = meta.lesson.duration || '';

  // 사이드바 하이라이트
  document.querySelectorAll('.sb-lesson-item').forEach(function (el) {
    el.classList.toggle('active', el.dataset.lessonId === lessonId);
  });

  // 이전/다음 버튼 상태
  var prev = lmsGetPrevLesson(STATE.courseId, lessonId);
  var next = lmsGetNextLesson(STATE.courseId, lessonId);
  document.getElementById('ctrlPrev').disabled = !prev;
  document.getElementById('ctrlNext').disabled = !next;

  // 완료 버튼 라벨
  var isDone = lmsIsComplete(STATE.courseId, lessonId);
  updateCompleteBtn(isDone, !!next);

  // 콘텐츠 렌더링
  if (meta.lesson.type === 'quiz') {
    renderQuiz(meta.lesson);
  } else if (meta.lesson.type === 'microteaching') {
    renderMicroTeaching(meta.lesson);
  } else {
    renderVideo(meta.lesson);
  }

  // 수료 체크 (이미 전부 완료된 경우 제외)
  updateSidebarProgress();
  if (typeof SubtitleSystem !== 'undefined') SubtitleSystem.updateVisibility();
  // 성찰 일지 로드
  loadJournalForLesson(meta);
  // AI 봇 컨텍스트 업데이트
  initAiBot(meta);
  window.scrollTo(0, 0);
}

/* ════════════════════ 영상 렌더링 ════════════════════ */
function renderVideo(lesson) {
  document.getElementById('videoWrap').style.display  = 'block';
  document.getElementById('quizWrap').style.display   = 'none';
  document.getElementById('certWrap').style.display   = 'none';
  document.getElementById('mtWrap').style.display     = 'none';
  document.getElementById('ctrlComplete').style.display = '';

  var container = document.getElementById('videoContainer');
  var videoId   = lesson.videoId || '';

  if (!videoId) {
    // 준비중 화면
    container.innerHTML = [
      '<div class="video-placeholder">',
      '  <div class="video-placeholder-icon">🎬</div>',
      '  <div class="video-placeholder-title">' + lp('강의 준비 중', 'Lesson Coming Soon') + '</div>',
      '  <div class="video-placeholder-sub">' + lp('곧 업로드될 예정입니다.<br>조금만 기다려 주세요!', 'This lesson will be available soon.<br>Please check back later!') + '</div>',
      '</div>'
    ].join('');
    return;
  }

  var src = '';
  if (lesson.videoType === 'youtube') {
    var ccParams = (typeof getLang === 'function' && getLang() === 'en')
      ? '&cc_load_policy=1&cc_lang_pref=en&hl=en' : '';
    src = 'https://www.youtube-nocookie.com/embed/' + videoId + '?rel=0&modestbranding=1' + ccParams;
  } else {
    // Google Drive
    src = 'https://drive.google.com/file/d/' + videoId + '/preview';
  }

  container.innerHTML = '<iframe src="' + src + '" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>';
}

function renderQuiz(lesson) {
  document.getElementById('videoWrap').style.display  = 'none';
  document.getElementById('quizWrap').style.display   = 'block';
  document.getElementById('certWrap').style.display   = 'none';
  document.getElementById('mtWrap').style.display     = 'none';
  document.getElementById('ctrlComplete').style.display = 'none';

  var isDone = lmsIsComplete(STATE.courseId, lesson.id);
  var html = [
    '<div class="quiz-header">',
    '  <div class="quiz-icon">📝</div>',
    '  <h3 class="quiz-title">' + lp(lesson.title, lesson.title_en || lesson.title) + '</h3>',
    '  <p class="quiz-desc">' + lp('아래 문제를 풀고 제출하세요.', 'Answer the questions below and submit.') + '</p>',
    '</div>',
    '<div class="quiz-questions" id="quizQuestions">'
  ];

  (lesson.quiz || []).forEach(function (q, qi) {
    html.push('<div class="quiz-q-block" id="qblock_' + qi + '">');
    html.push('  <p class="quiz-q-text"><span class="quiz-q-num">Q' + (qi + 1) + '</span> ' + q.q + '</p>');
    html.push('  <div class="quiz-options">');
    q.options.forEach(function (opt, oi) {
      html.push(
        '<label class="quiz-option" id="qopt_' + qi + '_' + oi + '">' +
        '<input type="radio" name="q' + qi + '" value="' + oi + '" onchange="selectQuizOpt(' + qi + ',' + oi + ')" ' + (isDone ? 'disabled' : '') + '>' +
        '<span class="quiz-opt-text">' + opt + '</span>' +
        '</label>'
      );
    });
    html.push('  </div>');
    html.push('</div>');
  });

  html.push('</div>');

  if (!isDone) {
    html.push('<button class="quiz-submit-btn" id="quizSubmitBtn" onclick="submitQuiz()" disabled>' + lp('제출하기', 'Submit') + '</button>');
  } else {
    html.push('<div class="quiz-already-done">✅ ' + lp('이미 완료한 퀴즈입니다.', 'You have already completed this quiz.') + '</div>');
    var next = lmsGetNextLesson(STATE.courseId, lesson.id);
    if (next) {
      html.push('<button class="btn-primary quiz-next-btn" onclick="loadLesson(\'' + next.id + '\')">다음 강의로 ›</button>');
    }
  }

  document.getElementById('quizInner').innerHTML = html.join('\n');
}

function selectQuizOpt(qi, oi) {
  STATE.quizAnswers[qi] = oi;
  var lesson  = STATE.lesson;
  var allDone = Object.keys(STATE.quizAnswers).length === (lesson.quiz || []).length;
  var btn = document.getElementById('quizSubmitBtn');
  if (btn) btn.disabled = !allDone;
}

function submitQuiz() {
  if (STATE.quizSubmitted) return;
  STATE.quizSubmitted = true;
  var lesson   = STATE.lesson;
  var quiz     = lesson.quiz || [];
  var score    = 0;
  var resultHtml = '';

  quiz.forEach(function (q, qi) {
    var chosen  = STATE.quizAnswers[qi];
    var correct = q.answer;
    var isRight = (parseInt(chosen) === correct);
    if (isRight) score++;

    // 시각적 피드백
    var block = document.getElementById('qblock_' + qi);
    if (block) block.classList.add(isRight ? 'quiz-correct' : 'quiz-wrong');

    // 옵션 라벨 색칠
    q.options.forEach(function (opt, oi) {
      var lbl = document.getElementById('qopt_' + qi + '_' + oi);
      if (!lbl) return;
      if (oi === correct) lbl.classList.add('quiz-correct-opt');
      else if (oi === parseInt(chosen) && !isRight) lbl.classList.add('quiz-wrong-opt');
      lbl.querySelector('input').disabled = true;
    });
  });

  var pct = quiz.length ? Math.round((score / quiz.length) * 100) : 100;
  var pass = pct >= 60;

  // 제출 버튼 → 결과 메시지
  var btn = document.getElementById('quizSubmitBtn');
  if (btn) {
    btn.style.display = 'none';
    var next = lmsGetNextLesson(STATE.courseId, lesson.id);
    var resultDiv = document.createElement('div');
    resultDiv.className = 'quiz-result ' + (pass ? 'quiz-pass' : 'quiz-fail');
    resultDiv.innerHTML = [
      '<div class="quiz-result-score">' + (pass ? '🎉' : '😅') + ' ' + score + '/' + quiz.length + '점 (' + pct + '%)</div>',
      '<div class="quiz-result-msg">' + (pass ? lp('통과! 수고하셨습니다.', 'Passed! Well done.') : lp('60점 이상이어야 통과합니다. 다시 도전해 보세요.', 'You need 60% or higher to pass. Try again!')) + '</div>',
      pass ? (next
        ? '<button class="btn-primary quiz-next-btn" onclick="loadLesson(\'' + next.id + '\')">\u21c2 ' + lp('다음 강의로 ›', 'Next Lesson ›') + '</button>'
        : '<button class="btn-primary quiz-next-btn" onclick="checkCompletion()">' + lp('수료 확인 ›', 'View Certificate ›') + '</button>')
      : '<button class="quiz-retry-btn" onclick="loadLesson(\'' + lesson.id + '\')">\u21ba ' + lp('다시 풀기', 'Try Again') + '</button>'
    ].join('');
    btn.parentNode.appendChild(resultDiv);
  }

  if (pass) {
    lmsMarkComplete(STATE.courseId, lesson.id);
    updateSidebarProgress();
    updateSidebarItem(lesson.id);
  }
}

/* ════════════════════ 완료 & 다음 ════════════════════ */
function markAndNext() {
  lmsMarkComplete(STATE.courseId, STATE.lessonId);

  updateSidebarItem(STATE.lessonId);
  var next = lmsGetNextLesson(STATE.courseId, STATE.lessonId);
  if (next) {
    loadLesson(next.id);
  } else {
    checkCompletion();

}

function goLesson(dir) {
  var target = dir === 'prev'
    ? lmsGetPrevLesson(STATE.courseId, STATE.lessonId)
    : lmsGetNextLesson(STATE.courseId, STATE.lessonId);
  if (target) loadLesson(target.id);
}

function updateCompleteBtn(isDone, hasNext) {
  var btn   = document.getElementById('ctrlComplete');
  var label = document.getElementById('ctrlCompleteLabel');
  if (isDone) {
    btn.classList.add('complete-done');
    label.textContent = hasNext ? '✅ ' + lp('완료됨 — 다음 강의 ›', 'Done — Next ›') : '✅ ' + lp('완료됨', 'Done');

    btn.classList.remove('complete-done');
    label.innerHTML = hasNext ? lp('완료 &amp; 다음 강의', 'Complete &amp; Next') : lp('완료', 'Complete');

function checkCompletion() {

/* ════════════════════ 사이드바 ════════════════════ */
function renderSidebar() {
  var course = STATE.course;
  var html   = '';

  course.modules.forEach(function (mod) {
    html += '<div class="sb-module-block">';
    html += '<div class="sb-module-title">' + lp(mod.title, mod.title_en || mod.title) + '</div>';
    html += '<ul class="sb-lesson-list">';
    mod.lessons.forEach(function (les) {
      var done  = lmsIsComplete(course.id, les.id);
      var isAct = les.id === STATE.lessonId;
      var icon  = les.type === 'quiz' ? '📝' : les.type === 'microteaching' ? (done ? '✅' : '🎬') : (done ? '✅' : '▶');
      html += '<li class="sb-lesson-item ' + (isAct ? 'active' : '') + ' ' + (done ? 'done' : '') + '"' +
              ' data-lesson-id="' + les.id + '"' +
              ' onclick="loadLesson(\'' + les.id + '\')">' +
              '<span class="sb-lesson-icon">' + icon + '</span>' +
              '<span class="sb-lesson-name">' + lp(les.title, les.title_en || les.title) + '</span>' +
              '<span class="sb-lesson-dur">' + (les.duration || '') + '</span>' +
              '</li>';
    });
    html += '</ul></div>';
  });

  document.getElementById('sidebarModules').innerHTML = html;
  updateSidebarProgress();
}

function updateSidebarProgress() {
  var prog = lmsGetCourseProgress(STATE.courseId);
  var fill = document.getElementById('sidebarProgFill');
  var text = document.getElementById('sidebarProgText');
  var color = STATE.course ? STATE.course.color : '#1b4f8a';
  if (fill) { fill.style.width = prog.pct + '%'; fill.style.background = color; }
  if (text) text.textContent = prog.done + '/' + prog.total + lp('강 완료', ' lessons done') + ' (' + prog.pct + '%)';
}

function updateSidebarItem(lessonId) {
  var item = document.querySelector('.sb-lesson-item[data-lesson-id="' + lessonId + '"]');
  if (!item) return;
  var lesson = STATE.lesson;
  if (!lesson) return;
  item.classList.add('done');
  var icon = item.querySelector('.sb-lesson-icon');
  if (icon) icon.textContent = lesson.type === 'quiz' ? '📝' : lesson.type === 'microteaching' ? '✅' : '✅';
}

function toggleSidebar() {
  document.getElementById('playerSidebar').classList.toggle('open');
}

function getOfflineResponse(text) {
  var t = text.toLowerCase().replace(/\s/g, '');
  var pool;
  if (/ai|인공지능|챗gpt|chatgpt|패러다임/.test(t))       pool = SCAFFOLD_HINTS.ai;
  else if (/pbl|프로젝트|drivingquestion|문제기반/.test(t)) pool = SCAFFOLD_HINTS.pbl;
  else if (/플립|flip|사전학습/.test(t))                    pool = SCAFFOLD_HINTS.flip;
  else if (/마이크로|티칭|microteaching|실습/.test(t))      pool = SCAFFOLD_HINTS.micro;
  else if (/tmd|달란트|재능|talent|mina|denarius|책임리더십/.test(t)) pool = SCAFFOLD_HINTS.tmd;
  else if (/가치관|비전|인격|균형|헌신/.test(t))       pool = SCAFFOLD_HINTS.values;
  else if (/데이터|연구|통계|분석/.test(t))                 pool = SCAFFOLD_HINTS.research;
  else {
    // 현재 강의 제목 기반 추론
    var lt = (STATE.lesson ? STATE.lesson.title : '').toLowerCase();
    if (/ai|패러다임/.test(lt))   pool = SCAFFOLD_HINTS.ai;
    else if (/pbl/.test(lt))      pool = SCAFFOLD_HINTS.pbl;
    else if (/플립/.test(lt))     pool = SCAFFOLD_HINTS.flip;
    else if (/마이크로/.test(lt)) pool = SCAFFOLD_HINTS.micro;
    else if (/tmd|달란트|talent|mina|denarius/.test(lt)) pool = SCAFFOLD_HINTS.tmd;
    else                          pool = SCAFFOLD_HINTS.default;
  }
  return pool[Math.floor(Math.random() * pool.length)];
}

/* ── API 호출 ── */
async function callClaudeAPI(userText) {
  var cfg = window.LMS_CONFIG || {};
  var apiKey   = cfg.claudeApiKey   || '';
  var endpoint = cfg.chatApiEndpoint || '';

  if (!apiKey) return null;

  // Direct Anthropic API (browser CORS may block — use chatApiEndpoint proxy for production)
  var url = endpoint || 'https://api.anthropic.com/v1/messages';

  AI_BOT.messages.push({ role: 'user', content: userText });
  var msgSlice = AI_BOT.messages.slice(-12);  // 최근 12개 메시지만 전송

  var headers = { 'Content-Type': 'application/json' };
  if (!endpoint || endpoint.includes('anthropic.com')) {
    headers['x-api-key'] = apiKey;
    headers['anthropic-version'] = '2023-06-01';
    headers['anthropic-dangerous-client-side-auth'] = 'true';
  } else {
    headers['Authorization'] = 'Bearer ' + apiKey;
  }

  try {
    var res = await fetch(url, {
      method: 'POST',
      headers: headers,
      body: JSON.stringify({
        model: 'claude-haiku-4-5',
        max_tokens: 220,
        system: buildAiBotSystemPrompt(),
        messages: msgSlice
      })
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    var data  = await res.json();
    var reply = data.content && data.content[0] ? data.content[0].text : null;
    if (reply) {
      AI_BOT.messages.push({ role: 'assistant', content: reply });
    } else {
      AI_BOT.messages.pop();
    }
    return reply;
  } catch (e) {
    console.warn('[티봇] API 오류:', e.message, '→ 오프라인 모드로 전환');
    if (AI_BOT.messages.length && AI_BOT.messages[AI_BOT.messages.length - 1].role === 'user') {
      AI_BOT.messages.pop();
    }
    return null;
  }
}

/* ── 메시지 전송 ── */
async function sendAiMsg() {
  if (AI_BOT.isLoading) return;
  var input = document.getElementById('aiBotInput');
  var text = input.value.trim();
  if (!text) return;

  input.value = '';
  input.style.height = 'auto';

  appendAiBubble('user', text);
  AI_BOT.isLoading = true;
  showAiBotTyping();

  // 빠른 제안 숨기기
  var sugg = document.getElementById('aiBotSuggestions');
  if (sugg) sugg.style.display = 'none';

  var reply = null;
  var cfg = window.LMS_CONFIG || {};
  var isOffline = !cfg.claudeApiKey;

  if (!isOffline) {
    reply = await callClaudeAPI(text);
  }

  // API 실패 또는 오프라인 → 힌트 뱅크 사용
  if (!reply) {
    await new Promise(function(r){ setTimeout(r, 700 + Math.random() * 600); });
    reply = getOfflineResponse(text);
    if (isOffline && AI_BOT.messages.length <= 0) {
      reply = '💡 오프라인 스캐폴딩 모드입니다. lms-data.js에 claudeApiKey를 설정하면 Claude AI가 활성화됩니다.\n\n' + reply;
    }
  }

  hideAiBotTyping();
  appendAiBubble('bot', reply);
  AI_BOT.isLoading = false;
}

function appendAiBubble(role, text) {
  var wrap = document.getElementById('aiBotMessages');
  var div  = document.createElement('div');
  div.className = 'ai-msg ai-msg-' + role;

  var safe = escapeHtml(text).replace(/\n/g, '<br>');
  if (role === 'bot') {
    div.innerHTML = '<span class="ai-msg-av">🤖</span><div class="ai-msg-bub">' + safe + '</div>';
  } else {
    div.innerHTML = '<div class="ai-msg-bub">' + safe + '</div>';
  }
  wrap.appendChild(div);
  wrap.scrollTop = wrap.scrollHeight;

  if (!AI_BOT.isOpen && role === 'bot') {
    AI_BOT.unread++;
    var badge = document.getElementById('aiBotBadge');
    if (badge) { badge.textContent = AI_BOT.unread; badge.style.display = ''; }
  }
}

function showAiBotTyping() {
  var wrap = document.getElementById('aiBotMessages');
  var div  = document.createElement('div');
  div.id = 'aiBotTyping';
  div.className = 'ai-msg ai-msg-bot ai-typing';
  div.innerHTML = '<span class="ai-msg-av">🤖</span><div class="ai-msg-bub"><span class="ai-dot"></span><span class="ai-dot"></span><span class="ai-dot"></span></div>';
  wrap.appendChild(div);
  wrap.scrollTop = wrap.scrollHeight;
}

function hideAiBotTyping() {
  var el = document.getElementById('aiBotTyping');
  if (el) el.remove();
}

/* ── 패널 토글 ── */
function toggleAiBot() {
  AI_BOT.isOpen = !AI_BOT.isOpen;
  document.getElementById('aiBotPanel').classList.toggle('open', AI_BOT.isOpen);

  if (AI_BOT.isOpen) {
    AI_BOT.unread = 0;
    var badge = document.getElementById('aiBotBadge');
    if (badge) badge.style.display = 'none';
    setTimeout(function () {
      var input = document.getElementById('aiBotInput');
      if (input) input.focus();
      var msgs = document.getElementById('aiBotMessages');
      if (msgs) msgs.scrollTop = msgs.scrollHeight;
    }, 280);
  }
}

/* ── 초기화 / 강의 전환 시 컨텍스트 업데이트 ── */
function initAiBot(meta) {
  var lesson = STATE.lesson;
  var ctxEl  = document.getElementById('aiBotCtx');
  if (ctxEl) {
    ctxEl.textContent = lesson ? lesson.title : '강의를 선택해주세요';
  }

  // 메시지 영역 최초 초기화
  var msgs = document.getElementById('aiBotMessages');
  if (!msgs) return;
  if (msgs.children.length === 0) {
    msgs.innerHTML = buildAiBotWelcomeHtml();
    renderAiBotSuggestions();
  } else {
    // 강의 전환 시 컨텍스트 변경 알림 (최초 초기화 이후)
    if (AI_BOT.messages.length > 0) {
      appendAiBubble('bot', '📍 강의가 바뀌었습니다: ' + (lesson ? lesson.title : '') + '\n새 강의에 대해 궁금한 게 있으면 언제든 물어보세요!');
    }
    // 제안 칩 업데이트
    renderAiBotSuggestions();
  }

  // textarea 자동 높이
  var textarea = document.getElementById('aiBotInput');
  if (textarea && !textarea._heightBound) {
    textarea._heightBound = true;
    textarea.addEventListener('input', function () {
      this.style.height = 'auto';
      this.style.height = Math.min(this.scrollHeight, 100) + 'px';
    });
  }
}

function renderAiBotSuggestions() {
  var el = document.getElementById('aiBotSuggestions');
  if (!el) return;
  var lesson = STATE.lesson;
  var chips;

  if (!lesson) {
    chips = ['AI 시대 교육에 대해 궁금해요', 'TMD 리더십이 무엇인가요?', '어디서 시작하면 좋을까요?'];
  } else if (/ai|패러다임/.test(lesson.title))  chips = ['AI가 교육을 어떻게 바꿀까요?', 'ChatGPT 활용이 고민됩니다', 'AI 시대 교사의 역할은?'];
  else if (/pbl|프로젝트/.test(lesson.title))   chips = ['Driving Question 설계가 어려워요', 'PBL 평가는 어떻게?', '현장 PBL 적용법은?'];
  else if (/플립/.test(lesson.title))            chips = ['사전 학습 영상 제작 팁은?', '학생이 예습 안 할 때는?', '플립러닝 수업 흐름이 궁금해요'];
  else if (/마이크로/.test(lesson.title))        chips = ['피드백 어떻게 받아들여야 하나요?', '내 수업의 약점을 찾고 싶어요', '루브릭 활용 방법이 궁금해요'];
  else if (/tmd|달란트|재능/.test(lesson.title)) chips = ['내 Talent를 어떻게 찾나요?', '책임 리더십의 의미는?', 'TMD를 현장에서 어떻게?'];
  else if (/수료|최종/.test(lesson.title))       chips = ['이 과정에서 배운 핵심은?', '현장 첫 적용을 어떻게 할까요?', '앞으로의 성장 방향은?'];
  else chips = ['이 강의의 핵심이 뭔가요?', '현장 적용이 막막합니다', '더 깊이 이해하고 싶어요'];

  el.style.display = '';
  el.innerHTML = '<div class="ai-sugg-label">💬 빠른 질문</div>' +
    chips.map(function(c) {
      return '<button class="ai-sugg-chip" onclick="useAiSuggestion(this)">' + escapeHtml(c) + '</button>';
    }).join('');
}

  document.getElementById('mtPlayerArea').style.display  = 'block';

  var src = '';
  if (url.includes('youtube.com') || url.includes('youtu.be')) {
    var ytId = url.match(/(?:v=|youtu\.be\/)([A-Za-z0-9_-]{11})/);
    if (ytId) src = 'https://www.youtube-nocookie.com/embed/' + ytId[1] + '?rel=0';
  } else if (url.includes('drive.google.com')) {
    var driveId = url.match(/\/d\/([^/?]+)/);
    src = driveId ? 'https://drive.google.com/file/d/' + driveId[1] + '/preview'
                  : url.replace('/view', '/preview');
  } else {
    src = url;
  }

  var wrap = document.getElementById('mtIframeWrap');
  wrap.innerHTML = src
    ? '<iframe src="'+src+'" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>'
    : '<div class="mt-invalid-url"><p>⚠️ 인식할 수 없는 URL입니다.<br>Google Drive 또는 YouTube 링크를 사용하세요.</p></div>';
}

  document.getElementById('mtSubmitArea').style.display  = 'block';

}

/* ── 타임라인 ── */
function onTimelineClick(e) {
  var bar  = document.getElementById('mtTimelineBar');
  var rect = bar.getBoundingClientRect();
  var ratio = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
  var secs  = Math.round(ratio * MT_STATE.videoDuration);
  document.getElementById('mtTimeInput').value = formatMtTime(secs);
  document.getElementById('mtCommentInput').focus();
}

function updateMtDuration(val) {
  MT_STATE.videoDuration = parseMtTime(val) || 600;
  var el = document.getElementById('mtTimelineEnd');
  if (el) el.textContent = formatMtTime(MT_STATE.videoDuration);
  renderMtTimeline();
}

function formatMtTime(secs) {
  var m = Math.floor(secs / 60), s = secs % 60;
  return m + ':' + (s < 10 ? '0' + s : s);
}

function parseMtTime(str) {
  if (!str) return 0;
  var p = (str + '').split(':');
  return p.length === 2 ? (parseInt(p[0])||0) * 60 + (parseInt(p[1])||0) : (parseInt(str)||0);
}

/* ── 코멘트 CRUD ── */
function addMtComment() {
  var text    = document.getElementById('mtCommentInput').value.trim();
  var timeStr = document.getElementById('mtTimeInput').value.trim();
  if (!text) { document.getElementById('mtCommentInput').focus(); return; }
  var user = lmsGetUser();
  MT_STATE.comments.push({
    id: Date.now(),
    time: parseMtTime(timeStr) || 0,
    text: text,
    author: user ? user.name : '익명',
    createdAt: Date.now()
  });
  MT_STATE.comments.sort(function(a,b){ return a.time - b.time; });
  document.getElementById('mtTimeInput').value    = '';
  document.getElementById('mtCommentInput').value = '';
  saveMtData();
  renderMtTimeline();
  renderMtComments();
}

function deleteMtComment(id) {
  MT_STATE.comments = MT_STATE.comments.filter(function(c){ return c.id !== id; });
  saveMtData();
  renderMtTimeline();
  renderMtComments();
}

function renderMtTimeline() {
  var el = document.getElementById('mtTimelineMarkers');
  if (!el) return;
  var colors = ['#e53e3e','#dd6b20','#d69e2e','#38a169','#3182ce','#805ad5','#d53f8c','#0891b2'];
  var html = MT_STATE.comments.map(function(c, i) {
    var pct = MT_STATE.videoDuration > 0 ? Math.max(0, Math.min(97, c.time / MT_STATE.videoDuration * 100)) : 0;
    return '<div class="mt-timeline-marker" style="left:'+pct+'%;background:'+colors[i%colors.length]+'"'+
           ' title="'+formatMtTime(c.time)+': '+escapeHtml(c.text)+'"'+
           ' onclick="scrollToMtComment('+c.id+')"></div>';
  }).join('');
  el.innerHTML = html;
}

function scrollToMtComment(id) {
  var el = document.getElementById('mtc_' + id);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function renderMtComments() {
  var list    = document.getElementById('mtCommentsList');
  var countEl = document.getElementById('mtCommentCount');
  if (!list) return;
  if (countEl) countEl.textContent = MT_STATE.comments.length ? '('+MT_STATE.comments.length+'개)' : '';
  if (!MT_STATE.comments.length) {
    list.innerHTML = '<div class="mt-empty-comments">영상을 보며 특정 시점의 피드백을 남겨보세요.<br>타임라인 바를 클릭하면 해당 시간이 자동 입력됩니다.</div>';
    return;
  }
  var colors = ['#e53e3e','#dd6b20','#d69e2e','#38a169','#3182ce','#805ad5','#d53f8c','#0891b2'];
  list.innerHTML = MT_STATE.comments.map(function(c, i) {
    return [
      '<div class="mt-comment-item" id="mtc_'+c.id+'">',
      '  <div class="mt-comment-time-badge" style="background:'+colors[i%colors.length]+'">'+formatMtTime(c.time)+'</div>',
      '  <div class="mt-comment-body">',
      '    <div class="mt-comment-text">'+escapeHtml(c.text)+'</div>',
      '    <div class="mt-comment-meta"><span class="mt-comment-author">'+escapeHtml(c.author)+'</span></div>',
      '  </div>',
      '  <button class="mt-comment-del-btn" onclick="deleteMtComment('+c.id+')" title="삭제">✕</button>',
      '</div>'
    ].join('\n');
  }).join('');
}

function setMtScore(criteriaId, score) {
  MT_STATE.scores[criteriaId] = score;
  updateRubricItemUI(criteriaId, score);
  updateMtTotalScore();
  saveMtData();
}

function updateRubricItemUI(criteriaId, score) {
  document.querySelectorAll('.mt-score-dot[data-criteria="'+criteriaId+'"]').forEach(function(dot) {
    var ds = parseInt(dot.dataset.score);
    dot.classList.toggle('active',   ds <= score && score > 0);
    dot.classList.toggle('selected', ds === score);
  });
  var labelEl = document.getElementById('mtr_label_'+criteriaId);
  if (labelEl) {
    if (score > 0) {
      var c = MT_RUBRIC_CRITERIA.find(function(x){ return x.id === criteriaId; });
      var names = ['','미흡','보통','우수','탁월'];
      labelEl.textContent = score+'점 — '+c.levels[score-1];
      labelEl.className = 'mt-rubric-level-label level-'+['','bad','mid','good','great'][score];
    } else {
      labelEl.textContent = '점수를 선택하세요';
      labelEl.className = 'mt-rubric-level-label';
    }
  }
}

function updateAllRubricUI() {
  MT_RUBRIC_CRITERIA.forEach(function(c) {
    updateRubricItemUI(c.id, MT_STATE.scores[c.id] || 0);
  });
  updateMtTotalScore();
}

function updateMtTotalScore() {
  var total = MT_RUBRIC_CRITERIA.reduce(function(sum, c){ return sum + (MT_STATE.scores[c.id]||0); }, 0);
  var grade, cls;
  if (total === 0)      { grade = '—';   cls = ''; }
  else if (total >= 17) { grade = '탁월'; cls = 'grade-great'; }
  else if (total >= 13) { grade = '우수'; cls = 'grade-good'; }
  else if (total >= 9)  { grade = '보통'; cls = 'grade-mid'; }
  else                  { grade = '미흡'; cls = 'grade-bad'; }

  var scoreEl = document.getElementById('mtTotalScore');
  var gradeEl = document.getElementById('mtTotalGrade');
  var badgeEl = document.getElementById('mtRubricTotalBadge');
  if (scoreEl) scoreEl.textContent = total + ' / 20점';
  if (gradeEl) { gradeEl.textContent = grade; gradeEl.className = 'mt-total-grade ' + cls; }
  if (badgeEl) { badgeEl.textContent = total + ' / 20'; badgeEl.className = 'mt-rubric-total-badge ' + cls; }
}

/* ════════════════════ 성찰 일지 ════════════════════ */
var JOURNAL_STATE = {
  isOpen:      false,
  autoSaveTimer: null,
  isEditing:   false   // 기존 항목 수정 중인지
};

/* 주차별 메지로 이론 프롬프트 */
function getReflectionData(moduleTitle) {
  if (/3주차/.test(moduleTitle)) {
    return {
      desc: 'PBL 적용 단계에서 비판적 성찰(Critical Reflection)을 통해 교수 철학의 변화를 기록하세요.',
      prompts: [
        'PBL을 설계하면서 기존의 "교사 중심" 사고가 어떻게 도전받았나요?',
        '학습자 스스로 문제를 정의하도록 했을 때, 나는 어떤 불편함을 느꼈나요? 그 이유는?',
        '이 접근법이 내가 활동하는 현장(봉사지·교실)에 실현 가능한가요? 어떤 장벽이 있을까요?'
      ]
    };
  } else if (/4주차/.test(moduleTitle)) {
    return {
      desc: '현장 적용 단계에서 관점 전환(Perspective Transformation)을 기록하세요. 진정한 변화는 여기서 시작됩니다.',
      prompts: [
        '이 과정을 통해 나의 교육관·리더십에서 가장 크게 변화한 것은 무엇인가요?',
        '현장으로 돌아가 첫 번째로 실천할 구체적인 변화 한 가지를 적어보세요.',
        '이 여정에서 내가 발견한 사명과 통찰은 무엇이었나요?'
      ]
    };
  } else if (/2주차/.test(moduleTitle)) {
    return {
      desc: '새로운 개념을 접하면서 생긴 인지적 불협화(Disorienting Dilemma)를 솔직하게 기록하세요.',
      prompts: [
        '오늘 배운 내용 중 기존의 내 관행이나 생각과 충돌하는 부분이 있었나요?',
        '그 불협화를 어떻게 받아들이거나 해소했나요?',
        '실제로 시도해보고 싶은 아이디어를 구체적으로 한 가지 써보세요.'
      ]
    };
  } else {
    return {
      desc: '비판적 성찰(Critical Reflection)은 단순한 복습이 아닙니다. 배움이 나의 세계관을 어떻게 바꾸는지 물어보는 과정입니다.',
      prompts: [
        '이번 강의에서 가장 인상 깊었던 내용은 무엇이고, 그 이유는 무엇인가요?',
        '이 내용이 나의 교육 활동·리더십 방식에 어떤 의미를 주나요?',
        '오늘 배운 것을 내일 현장에서 어떻게 연결할 수 있을까요?'
      ]
    };
  }
}

function loadJournalForLesson(meta) {
  if (!meta) return;
  var moduleTitle = meta.module.title;
  var lessonTitle = meta.lesson.title;
  var refData = getReflectionData(moduleTitle);

  // 이론 설명 업데이트
  document.getElementById('journalTheoryDesc').textContent = refData.desc;
  document.getElementById('journalWriteLabel').textContent = lessonTitle + ' — 성찰';

  // 프롬프트 렌더링
  var promptsHtml = refData.prompts.map(function (p, i) {
    return '<div class="journal-prompt-item"><span class="journal-prompt-num">Q' + (i + 1) + '</span><span class="journal-prompt-text">' + p + '</span></div>';
  }).join('');
  document.getElementById('journalPrompts').innerHTML = promptsHtml;

  // 기존 저장 내용 불러오기
  var entries = lmsGetJournals(STATE.courseId, STATE.lessonId);
  var latest  = entries.length ? entries[entries.length - 1] : null;
  var textarea = document.getElementById('journalTextarea');
  textarea.value = latest ? latest.text : '';
  JOURNAL_STATE.isEditing = !!latest;

  // 저장 상태 표시
  updateAutosaveBadge(latest ? latest.savedAt : null);

  // 이전 일지 이력 렌더링
  renderJournalHistory(entries);

  // 항목 수 뱃지 업데이트
  updateJournalCount();

  // 자동저장 이벤트 (재등록)
  textarea.oninput = function () {
    clearTimeout(JOURNAL_STATE.autoSaveTimer);
    document.getElementById('journalAutosaveBadge').textContent = '입력 중...';
    document.getElementById('journalAutosaveBadge').className = 'journal-autosave-badge typing';
    JOURNAL_STATE.autoSaveTimer = setTimeout(function () {
      if (textarea.value.trim()) autoSaveJournal();
    }, 2500);
  };
}

function autoSaveJournal() {
  var text = document.getElementById('journalTextarea').value.trim();
  if (!text) return;
  var meta = lmsGetLessonMeta(STATE.courseId, STATE.lessonId);
  var entry = lmsSaveJournal(STATE.courseId, STATE.lessonId, text,
    meta ? meta.lesson.title : '', meta ? meta.module.title : '');
  updateAutosaveBadge(entry.savedAt, true);
  JOURNAL_STATE.isEditing = true;
  renderJournalHistory(lmsGetJournals(STATE.courseId, STATE.lessonId));
  updateJournalCount();
}

function saveJournal() {
  var text = document.getElementById('journalTextarea').value.trim();
  if (!text) {
    document.getElementById('journalTextarea').focus();
    return;
  }
  var meta = lmsGetLessonMeta(STATE.courseId, STATE.lessonId);
  var entry = lmsSaveJournal(STATE.courseId, STATE.lessonId, text,
    meta ? meta.lesson.title : '', meta ? meta.module.title : '');
  updateAutosaveBadge(entry.savedAt);
  JOURNAL_STATE.isEditing = true;
  renderJournalHistory(lmsGetJournals(STATE.courseId, STATE.lessonId));
  updateJournalCount();
  // 저장 완료 피드백
  var btn = document.getElementById('journalBtnSave');
  btn.textContent = '✅ 저장됨';
  btn.classList.add('saved');
  setTimeout(function () { btn.textContent = '💾 저장하기'; btn.classList.remove('saved'); }, 2000);
}

function newJournalEntry() {
  var text = document.getElementById('journalTextarea').value.trim();
  if (!text) return;
  var meta = lmsGetLessonMeta(STATE.courseId, STATE.lessonId);
  lmsAddJournalEntry(STATE.courseId, STATE.lessonId, text,
    meta ? meta.lesson.title : '', meta ? meta.module.title : '');
  document.getElementById('journalTextarea').value = '';
  updateAutosaveBadge(null);
  renderJournalHistory(lmsGetJournals(STATE.courseId, STATE.lessonId));
  updateJournalCount();
}

function updateAutosaveBadge(savedAt, isAuto) {
  var badge = document.getElementById('journalAutosaveBadge');
  if (!savedAt) {
    badge.textContent = '저장 안 됨';
    badge.className = 'journal-autosave-badge';
  } else {
    var d = new Date(savedAt);
    var ts = d.getFullYear() + '.' + pad2(d.getMonth()+1) + '.' + pad2(d.getDate()) +
             ' ' + pad2(d.getHours()) + ':' + pad2(d.getMinutes());
    badge.textContent = (isAuto ? '자동저장 ' : '저장됨 ') + ts;
    badge.className = 'journal-autosave-badge saved';
  }
}

function pad2(n) { return n < 10 ? '0' + n : '' + n; }

function renderJournalHistory(entries) {
  var container = document.getElementById('journalHistory');
  if (entries.length <= 1) {
    container.innerHTML = '';
    return;
  }
  // 최신 항목 제외하고 이전 것들 보여주기
  var older = entries.slice(0, -1).reverse();
  var html = '<div class="journal-history-title">이전 기록 (' + older.length + '개)</div>';
  older.forEach(function (e, i) {
    var d = new Date(e.savedAt);
    var ts = d.getFullYear() + '.' + pad2(d.getMonth()+1) + '.' + pad2(d.getDate()) +
             ' ' + pad2(d.getHours()) + ':' + pad2(d.getMinutes());
    html += '<div class="journal-history-item">';
    html += '<div class="journal-history-meta">' + ts + '</div>';
    html += '<p class="journal-history-text">' + escapeHtml(e.text) + '</p>';
    html += '</div>';
  });
  container.innerHTML = html;
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

function updateJournalCount() {
  var count = lmsJournalCount(STATE.courseId);
  var badge = document.getElementById('journalEntryCount');
  if (count > 0) {
    badge.textContent = count + '개 기록';
    badge.style.display = '';
  } else {
    badge.style.display = 'none';
  }
}

function toggleJournal() {
  JOURNAL_STATE.isOpen = !JOURNAL_STATE.isOpen;
  var panel = document.getElementById('journalPanel');
  var arrow = document.getElementById('journalToggleArrow');
  panel.style.display = JOURNAL_STATE.isOpen ? 'block' : 'none';
  arrow.textContent   = JOURNAL_STATE.isOpen ? '▴' : '▾';
}

/* 전체 일지 모달 */
function openAllJournals() {
  var all = lmsGetAllCourseJournals(STATE.courseId);
  var modal = document.getElementById('allJournalsModal');
  var content = document.getElementById('allJournalsContent');

  if (!all.length) {
    content.innerHTML = '<p class="journal-modal-empty">아직 작성된 성찰 일지가 없습니다.<br>강의를 들으며 생각과 통찰을 기록해보세요. ✍️</p>';
  } else {
    var byModule = {};
    all.forEach(function (e) {
      var key = e.moduleTitle || '기타';
      if (!byModule[key]) byModule[key] = [];
      byModule[key].push(e);
    });
    var html = '';
    Object.keys(byModule).forEach(function (mod) {
      html += '<div class="journal-modal-group">';
      html += '<div class="journal-modal-group-title">' + escapeHtml(mod) + '</div>';
      byModule[mod].forEach(function (e) {
        var d = new Date(e.savedAt);
        var ts = d.getFullYear() + '.' + pad2(d.getMonth()+1) + '.' + pad2(d.getDate()) +
                 ' ' + pad2(d.getHours()) + ':' + pad2(d.getMinutes());
        html += '<div class="journal-modal-entry">';
        html += '<div class="journal-modal-entry-header">';
        html += '<span class="journal-modal-lesson">' + escapeHtml(e.lessonTitle) + '</span>';
        html += '<span class="journal-modal-ts">' + ts + '</span>';
        html += '</div>';
        html += '<p class="journal-modal-text">' + escapeHtml(e.text) + '</p>';
        html += '</div>';
      });
      html += '</div>';
    });
    content.innerHTML = html;
  }
  modal.classList.add('open');
}

function closeAllJournals() {
  document.getElementById('allJournalsModal').classList.remove('open');
}

    var btn = document.getElementById('subtitleCCBtn');
    if (!btn) return;
    btn.classList.toggle('cc-active', active);
    btn.title = active
      ? lp('AI 자막 비활성화', 'Disable AI Subtitles')
      : lp('AI 자막 활성화', 'Enable AI Subtitles');
  }

  /* ── Translation (MyMemory free API) ────────── */
  async function translate(koreanText) {
    if (!koreanText || !koreanText.trim()) return '';
    try {
      // Try Chrome Translation API first (offline, no quota)
      if (window.translation && window.translation.createTranslator) {
        if (!state.translatorCache) {
          var avail = await window.translation.canTranslate({ sourceLanguage:'ko', targetLanguage:'en' });
          if (avail !== 'no') {
            state.translatorCache = await window.translation.createTranslator({ sourceLanguage:'ko', targetLanguage:'en' });
          }
        }
        if (state.translatorCache) {
          return await state.translatorCache.translate(koreanText);
        }
      }
    } catch (e) {}
    // Fallback: MyMemory free API
    try {
      var res = await fetch(
        'https://api.mymemory.translated.net/get?q=' +
        encodeURIComponent(koreanText.slice(0, 500)) + '&langpair=ko|en'
      );
      var data = await res.json();
      if (data.responseStatus === 200) {
        return data.responseData.translatedText || koreanText;
      }
    } catch (e) {}
    return koreanText;
  }

  /* ── Mode 1: Groq Whisper (tab audio capture) ── */
  async function startGroqMode(groqKey) {
    var stream;
    try {
      stream = await navigator.mediaDevices.getDisplayMedia({
        video: true,
        audio: true,
        preferCurrentTab: true,
        selfBrowserSurface: 'include',
      });
    } catch (e) {
      console.warn('[Subtitle] getDisplayMedia failed:', e.message);
      showError(lp(
        '화면 공유가 취소되었습니다. 탭 선택 후 공유를 허용해 주세요.',
        'Screen share was cancelled. Please select this tab and allow sharing.'
      ));
      return false;
    }

    var audioTracks = stream.getAudioTracks();
    if (!audioTracks.length) {
      stream.getTracks().forEach(function(t){ t.stop(); });
      showError(lp(
        '오디오 트랙이 없습니다. 탭 공유 시 "오디오 공유" 체크박스를 활성화해 주세요.',
        'No audio track found. Please check "Share audio" when sharing the tab.'
      ));
      return false;
    }

    state.mediaStream = stream;
    var audioStream = new MediaStream(audioTracks);
    var mimeType = MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
      ? 'audio/webm;codecs=opus' : 'audio/webm';
    state.mediaRecorder = new MediaRecorder(audioStream, { mimeType: mimeType });

    var chunks = [];
    state.mediaRecorder.ondataavailable = function(e) {
      if (e.data && e.data.size > 0) chunks.push(e.data);
    };

    // Process every 5 seconds
    state.chunkTimer = setInterval(async function() {
      if (!state.active) return;
      state.mediaRecorder.stop();
      await new Promise(function(r){ setTimeout(r, 100); });

      if (chunks.length) {
        var blob = new Blob(chunks, { type: mimeType });
        chunks = [];
        processGroqChunk(blob, groqKey);
      }

      state.mediaRecorder.start();
    }, 5000);

    state.mediaRecorder.start();
    state.mode = 'groq';

    // Stop if user stops sharing
    stream.getVideoTracks()[0].onended = function() {
      SubtitleSystem.stop();
    };
    return true;
  }

  async function processGroqChunk(blob, apiKey) {
    try {
      setSubtitleText(lp('번역 중…', 'Translating…'), true);
      var form = new FormData();
      form.append('file', blob, 'audio.webm');
      form.append('model', 'whisper-large-v3');
      form.append('language', 'ko');
      form.append('response_format', 'text');

      var res = await fetch('https://api.groq.com/openai/v1/audio/transcriptions', {
        method: 'POST',
        headers: { 'Authorization': 'Bearer ' + apiKey },
        body: form
      });

      if (!res.ok) {
        var err = await res.text();
        console.warn('[Subtitle] Groq error:', err);
        return;
      }
      var korean = (await res.text()).trim();
      if (!korean) { setSubtitleText('', false); return; }

      var english = await translate(korean);
      setSubtitleText(english, false);
    } catch (e) {
      console.warn('[Subtitle] processGroqChunk error:', e);
    }
  }

  /* ── Mode 2: Browser SpeechRecognition (ko-KR) ── */
  function startSpeechMode() {
    var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) {
      showError(lp(
        'Chrome 브라우저에서만 지원됩니다.',
        'AI Subtitles require Chrome browser.'
      ));
      return false;
    }

    state.recognition = new SR();
    state.recognition.lang = 'ko-KR';
    state.recognition.continuous = true;
    state.recognition.interimResults = true;
    state.recognition.maxAlternatives = 1;

    state.recognition.onresult = async function(e) {
      var interim = '';
      var finals  = '';
      for (var i = e.resultIndex; i < e.results.length; i++) {
        var t = e.results[i][0].transcript;
        if (e.results[i].isFinal) finals += t;
        else interim += t;
      }
      if (finals) {
        setSubtitleText(lp('번역 중…', 'Translating…'), true);
        var en = await translate(finals);
        setSubtitleText(en, false);
      } else if (interim) {
        setSubtitleText('…' + interim, true);
      }
    };
    state.recognition.onerror = function(e) {
      if (e.error === 'no-speech') return;
      console.warn('[Subtitle] SR error:', e.error);
    };
    state.recognition.onend = function() {
      if (state.active && state.mode === 'speech') {
        try { state.recognition.start(); } catch(ex) {}
      }
    };

    state.recognition.start();
    state.mode = 'speech';
    return true;
  }

  /* ── Error display ───────────────────────────── */
  function showError(msg) {
    setSubtitleText('⚠ ' + msg, false);
    setTimeout(function(){ setSubtitleText('', false); }, 5000);
  }

  /* ── Guide modal ─────────────────────────────── */
  function showGuide(callback) {
    var groqKey = (window.LMS_CONFIG && window.LMS_CONFIG.groqApiKey) || '';
    var modal = document.createElement('div');
    modal.className = 'subtitle-guide-overlay';
    modal.id = 'subtitleGuideModal';

    var isEn = getLang() === 'en';

    modal.innerHTML =
      '<div class="subtitle-guide-box">' +
      '<h3>🌐 ' + (isEn ? 'AI English Subtitle Setup' : 'AI 영어 자막 설정') + '</h3>' +
      '<p>' + (isEn
        ? 'Automatically transcribes Korean lecture audio and displays real-time English subtitles.'
        : '한국어 강의 오디오를 자동으로 인식하여 영어 자막을 실시간으로 표시합니다.') + '</p>' +
      '<ul class="subtitle-guide-steps">' +
      '<li><span class="subtitle-guide-step-num">1</span>' +
      (isEn
        ? '<span>Enter your <strong>Groq API key</strong> below (free) for high-quality transcription. Or skip for microphone mode.</span>'
        : '<span>아래에 <strong>Groq API 키</strong>를 입력하면 고품질 자막을 이용할 수 있습니다. 없으면 마이크 모드로 진행합니다.</span>') +
      '</li>' +
      '<li><span class="subtitle-guide-step-num">2</span>' +
      (isEn
        ? '<span><strong>Tab audio mode (Groq)</strong>: Click "Share Tab" in the popup and enable audio sharing.</span>'
        : '<span><strong>탭 오디오 모드 (Groq)</strong>: 팝업에서 "탭 공유"를 선택하고 오디오 공유를 활성화하세요.</span>') +
      '</li>' +
      '<li><span class="subtitle-guide-step-num">3</span>' +
      (isEn
        ? '<span><strong>Microphone mode (no key)</strong>: Play video through speakers — the mic will pick up audio.</span>'
        : '<span><strong>마이크 모드 (키 없음)</strong>: 스피커로 영상을 재생하면 마이크가 음성을 인식합니다.</span>') +
      '</li>' +
      '</ul>' +
      '<div class="subtitle-guide-input-row">' +
      '<input type="password" id="subtitleGroqInput" placeholder="' +
      (isEn ? 'gsk_... (Groq API key — optional)' : 'gsk_... (Groq API 키 — 선택 사항)') +
      '" value="' + groqKey + '" />' +
      '</div>' +
      '<p class="subtitle-api-hint"><a href="https://console.groq.com" target="_blank" rel="noopener" style="color:#60a5fa;">console.groq.com</a> ' +
      (isEn ? '→ Free sign up → API Keys' : '→ 무료 가입 후 API Keys에서 발급') + '</p>' +
      '<div class="subtitle-guide-actions">' +
      '<button class="subtitle-btn-cancel" onclick="document.getElementById(\'subtitleGuideModal\').remove();">' +
      (isEn ? 'Cancel' : '취소') + '</button>' +
      '<button class="subtitle-btn-start" onclick="SubtitleSystem._confirmStart();">' +
      (isEn ? 'Start Subtitles' : '자막 시작') + '</button>' +
      '</div>' +
      '</div>';

    document.body.appendChild(modal);
  }

  /* ── Public API ──────────────────────────────── */
  return {
    toggle: function() {
      if (state.active) {
        this.stop();
      } else {
        showGuide();
      }
    },

    _confirmStart: async function() {
      var modal = document.getElementById('subtitleGuideModal');
      var keyInput = document.getElementById('subtitleGroqInput');
      var key = (keyInput ? keyInput.value.trim() : '') ||
                (window.LMS_CONFIG && window.LMS_CONFIG.groqApiKey) || '';

      if (modal) modal.remove();

      // Store key for this session
      state.groqKey = key;
      if (window.LMS_CONFIG) window.LMS_CONFIG.groqApiKey = key;

      state.active = true;
      setOverlayVisible(true);
      setCCBtnActive(true);

      var ok = false;
      if (key) {
        ok = await startGroqMode(key);
      } else {
        ok = startSpeechMode();
      }

      if (!ok) {
        state.active = false;
        setOverlayVisible(false);
        setCCBtnActive(false);
      }
    },

    stop: function() {
      state.active = false;
      if (state.recognition) {
        try { state.recognition.stop(); } catch(e) {}
        state.recognition = null;
      }
      if (state.mediaRecorder) {
        try { state.mediaRecorder.stop(); } catch(e) {}
        state.mediaRecorder = null;
      }
      if (state.mediaStream) {
        state.mediaStream.getTracks().forEach(function(t){ t.stop(); });
        state.mediaStream = null;
      }
      clearInterval(state.chunkTimer);
      clearTimeout(state.hideTimer);
      state.mode = null;
      setSubtitleText('', false);
      setOverlayVisible(false);
      setCCBtnActive(false);
    },

    /** Called whenever a lesson loads — shows/hides CC button */
    updateVisibility: function() {
      var btn = document.getElementById('subtitleCCBtn');
      if (!btn) return;
      var isEnglish  = (typeof getLang === 'function') && getLang() === 'en';
      var videoVisible = document.getElementById('videoWrap') &&
                         document.getElementById('videoWrap').style.display !== 'none';
      btn.style.display = (isEnglish && videoVisible) ? 'inline-flex' : 'none';
      // Auto-stop if switched to Korean
      if (!isEnglish && state.active) this.stop();
    }
  };
})();
</script>

<script>
/* ── Language switch re-render hook for player ── */
(function() {
  var _origSetLang = window.setLang;
  window.setLang = function(lang) {
    _origSetLang(lang);
    // Re-render player UI
    if (STATE && STATE.courseId) {
      document.getElementById('playerCourseTitle').textContent = lp(STATE.course.title, STATE.course.title_en || STATE.course.title);
      document.title = lp(STATE.course.title, STATE.course.title_en || STATE.course.title) + ' — ' + lp('티움 러닝센터', 'TIEUM Learning Center');
      renderSidebar();
      if (STATE.lessonId) loadLesson(STATE.lessonId);
      updateSidebarProgress();
      if (typeof SubtitleSystem !== 'undefined') SubtitleSystem.updateVisibility();
    }
  };
})();
</script>
